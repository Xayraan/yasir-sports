<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yaasir Sports - Contact</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="container nav-wrap">
        <a class="logo" href="/">Yaasir <span>Sports</span></a>
        <button id="menuBtn" class="menu-btn">Menu</button>
        <nav id="navLinks" class="nav-links">
          <a href="/">Home</a>
          <a href="/live.html">Live Matches</a>
          <a href="/schedule.html">Match Schedule</a>
          <a href="/leagues.html">Leagues</a>
          <a href="/highlights.html">Highlights</a>
          <a href="/news.html">News</a>
          <a class="active" href="/contact.html">Contact</a>
          <a href="/admin.html">Admin</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <div class="page-title">
          <h1>Contact</h1>
          <p>For partnerships, media inquiries, and platform support.</p>
        </div>

        <div class="grid-2">
          <article class="card">
            <h3>Yaasir Media Desk</h3>
            <p class="contact-text">Email: media@yaasir-sports.local</p>
            <p class="contact-text">Phone: +1 555 010 200</p>
            <div class="ads">Advertisement <small>Contact Page Ad</small></div>
          </article>

          <form id="contactForm" class="card form-grid">
            <label for="name">Name</label>
            <input id="name" name="name" required>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button class="btn btn-primary" type="submit">Send</button>
            <p id="contactMessage"></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer"><div class="container"><p>Yaasir Sports Platform</p></div></footer>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/contact.js"></script>
</body>
</html>
